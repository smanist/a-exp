# Slack App Manifest for the a-exp scheduler bot.
# Import this at https://api.slack.com/apps → "Create New App" → "From a manifest"
# or update an existing app via "App Manifest" in the sidebar.
#
# Socket Mode must be enabled separately in the app settings:
#   Settings → Socket Mode → Enable Socket Mode
# Then generate an App-Level Token with `connections:write` scope.

display_information:
  name: a-exp
  description: Autonomous research group assistant
  background_color: "#2c2d30"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: a-exp
    always_online: true
  slash_commands:
    - command: /a-exp
      description: Manage a-exp channels and configuration
      usage_hint: "[channel-mode dev|chat|remove] [status]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      # --- Core (DM-only mode) ---
      - chat:write          # Send messages, update, delete
      - im:history          # Receive DM message events (Socket Mode)
      - im:write            # Open DM conversations (notifications)
      - reactions:write     # Add/remove emoji reactions (acknowledgment)
      - users:read          # Look up user display names
      - commands            # /a-exp slash command

      # --- Channel support (ADR 0033) ---
      - app_mentions:read   # Receive @mention events in channels
      - channels:history    # Receive message events in public channels
      - channels:read       # List public channels (admin features)
      - groups:history      # Receive message events in private channels

settings:
  event_subscriptions:
    bot_events:
      - message.im               # DM messages
      - message.channels          # Public channel messages
      - message.groups            # Private channel messages
      - app_mention               # @mention events in channels
      - app_home_opened           # App Home tab visits
      - member_joined_channel     # Bot channel invitation restriction
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
